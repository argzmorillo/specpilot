name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate-source-branch:
    name: Validate PR source branch
    runs-on: ubuntu-latest

    steps:
      - name: Ensure PR comes from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Only pull requests from dev to main are allowed."
            exit 1
          fi
