name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Test backend
        run: npm run test
        working-directory: backend

      - name: Test backend e2e
        run: npm run test:e2e
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        working-directory: frontend
