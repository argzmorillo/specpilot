name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      OPENAI_API_KEY: fake-api-key
      OPENAI_MODEL: fake-model
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/specpilot
      KEYCLOAK_JWKS_URI: http://localhost:8080/realms/specpilot/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_ID: specpilot-api
      CORS_ALLOWED_ORIGINS: http://localhost:4200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci --workspace backend

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Test backend
        run: npm run test --workspace backend

      - name: Test backend e2e
        run: npm run test:e2e --workspace backend

      - name: Build backend
        run: npm run build --workspace backend

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --workspace frontend

      - name: Test frontend
        run: npm run test --workspace frontend -- --watch=false --browsers=ChromeHeadless

      - name: Build frontend
        run: npm run build --workspace frontend
