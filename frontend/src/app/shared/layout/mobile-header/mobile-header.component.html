<header
  class="sticky top-0 z-30 flex items-center justify-between border-b border-slate-200 bg-white/90 px-5 py-4 backdrop-blur lg:hidden"
>
  <div class="flex items-center gap-3">
    <div
      class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-violet-500 text-sm font-bold text-white"
    >
      ◆
    </div>

    <p class="font-semibold text-slate-900">
      {{ title() }}
    </p>
  </div>

  <button
    type="button"
    (click)="onOpenMenu()"
    class="rounded-xl border border-slate-200 bg-white p-2 text-slate-700 shadow-sm"
  >
    <lucide-icon [img]="menuIcon()" class="h-5 w-5"></lucide-icon>
  </button>
</header>
