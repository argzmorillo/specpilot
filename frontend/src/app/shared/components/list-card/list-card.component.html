<article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="mb-4 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl" [class]="iconClass()">
        <lucide-icon [img]="icon()" class="h-5 w-5"></lucide-icon>
      </div>

      <h3 class="text-base font-semibold text-slate-900">
        {{ title() }}
      </h3>
    </div>

    <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">
      {{ items().length }}
    </span>
  </div>

  @if (items().length) {
    <ul class="space-y-2 text-sm leading-6 text-slate-600">
      @for (item of visibleItems(); track item) {
        <li class="flex gap-2">
          <span class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-slate-400"></span>
          <span>{{ item }}</span>
        </li>
      }
    </ul>

    @if (items().length > maxVisibleItems()) {
      <button
        type="button"
        (click)="toggleExpanded()"
        class="mt-4 text-sm font-medium text-blue-600 hover:text-blue-500"
      >
        @if (expanded()) {
          Ver menos
        } @else {
          Ver todas
        }
      </button>
    }
  } @else {
    <p class="text-sm text-slate-500">
      {{ emptyMessage() }}
    </p>
  }
</article>
