services:
  postgres:
    image: postgres:16
    container_name: specpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: specpilot
      POSTGRES_PASSWORD: specpilot
      POSTGRES_DB: specpilot
    ports:
      - '5432:5432'
    volumes:
      - specpilot_postgres_data:/var/lib/postgresql/data

volumes:
  specpilot_postgres_data:
